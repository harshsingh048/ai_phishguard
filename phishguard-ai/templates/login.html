<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhishGuard AI — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="grid-overlay"></div>
<div class="scan-lines"></div>

<nav class="navbar">
  <div class="nav-brand">
    <span class="shield-icon">🛡️</span>
    <span class="brand-text">PHISH<span class="accent">GUARD</span></span>
    <span class="brand-ai">AI</span>
  </div>
  <div class="nav-links">
    <a href="/" class="nav-link">Scanner</a>
    <a href="/dashboard" class="nav-link">Dashboard</a>
    <a href="/login" class="nav-link active">Login</a>
  </div>
</nav>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-shield">🛡️</div>
      <h2 class="auth-title">SECURE LOGIN</h2>
      <p class="auth-sub">Access your threat intelligence dashboard</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="loginTab" onclick="showLogin()">Login</button>
      <button class="auth-tab" id="registerTab" onclick="showRegister()">Register</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div class="form-group">
        <label class="form-label">Username or Email</label>
        <input type="text" id="loginUsername" class="form-input" placeholder="Enter username or email" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="Enter password" autocomplete="current-password">
      </div>
      <div class="form-error hidden" id="loginError"></div>
      <button class="auth-btn" onclick="doLogin()">
        <span id="loginBtnText">LOGIN</span>
        <span class="spinner hidden" id="loginSpinner"></span>
      </button>
      <p class="auth-footer">No account? <a href="#" onclick="showRegister()">Register here</a></p>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="hidden">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="regUsername" class="form-input" placeholder="Choose a username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="regEmail" class="form-input" placeholder="Enter your email" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="regPassword" class="form-input" placeholder="Choose a password" autocomplete="new-password">
      </div>
      <div class="form-error hidden" id="registerError"></div>
      <button class="auth-btn" onclick="doRegister()">
        <span id="registerBtnText">CREATE ACCOUNT</span>
        <span class="spinner hidden" id="registerSpinner"></span>
      </button>
      <p class="auth-footer">Have an account? <a href="#" onclick="showLogin()">Login here</a></p>
    </div>
  </div>
</div>

<script src="/static/js/auth.js"></script>
</body>
</html>
